name: Build for Raspberry Pi

on:
  push:
    branches:
      - oceanix_dev
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install QEMU and dependencies
      run: |
        sudo apt update
        sudo apt install -y qemu qemu-user-static binfmt-support debootstrap

    - name: Setup Raspberry Pi environment
      run: |
        sudo mkdir rpi-root
        sudo debootstrap --arch=armhf --foreign buster rpi-root http://archive.raspbian.org/raspbian
        sudo cp /usr/bin/qemu-arm-static rpi-root/usr/bin/
        sudo chroot rpi-root /bin/bash -c "debootstrap/debootstrap --second-stage"

    - name: Copy Repository to rpi-root
      run: |
        sudo mkdir -p rpi-root/EVA/
        sudo cp -r ${GITHUB_WORKSPACE}/Oceanix/* rpi-root/EVA/

    - name: Compile in Raspberry Pi environment
      run: |
        sudo chroot rpi-root /bin/bash -c "cd EVA && chmod +x install.sh && ./install.sh"

    - name: Retrieve and commit built artifacts
      run: |
        sudo mkdir -p ${GITHUB_WORKSPACE}/build  # Ensure the build directory exists
        sudo cp -r ${GITHUB_WORKSPACE}/rpi-root/EVA/build/* ${GITHUB_WORKSPACE}/build/
        sudo chown -R $(whoami):$(whoami) ${GITHUB_WORKSPACE}/build  # Fix ownership for git commit
        sudo rm -r ${GITHUB_WORKSPACE}/rpi-root

    - name: Commit and push artifacts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add build/
        git commit -m "Add build artifacts [skip ci]"
        git push origin HEAD:${{ github.ref_name }}

